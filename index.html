<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Kvízová tabulka PRO</title>

<style>
body { font-family: Arial; margin: 20px; }
input { margin: 1px; width: 55px; }

/* TABULKY */
#results, #rounds table {
    border: 3px solid black;
    border-collapse: collapse;
    width: 100%;
    margin-top: 20px;
    table-layout: fixed;
}

#results th, #results td,
#rounds th, #rounds td {
    border: 1px solid black;
    padding: 4px;
    text-align: center;
    font-weight: bold;
    position: relative;
}

#results th { background-color: #eee; }

/* ÚZKÉ SLOUPCE */
.col-rank { width: 70px; }
.col-players { width: 60px; }

tr:nth-child(even) { background-color: #f2f2f2; }
.total { background-color: #d0d0d0; }

/* základ */
.scoreCell {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* bonus vpravo */
.bonusTag {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: green;
}

/* ULTRA KOMPAKT BONUS */
.bonusGroup {
    font-size: 10px;
    color: green;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2px;
}
.bonusGroup span { margin-right: 2px; }
.bonusGroup label {
    margin: 0;
    display: flex;
    align-items: center;
    gap: 1px;
}
.bonusGroup input {
    margin: 0;
    transform: scale(0.75);
}

/* tip */
.tipLine {
    font-size: 10px;
    margin-top: 1px;
}

/* HLAVIČKA KOLA */
.roundHeader {
    cursor: pointer;
    font-size: 13px;
}
.locked {
    background: #ddd;
}

/* fullscreen */
#bigTable {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:white;
    overflow:auto;
    display:none;
    padding:20px;
}
#bigTable table { font-size: 26px; }

button { margin: 10px 5px; padding: 8px 12px; }
</style>
</head>

<body>

<h2>Nastavení kvízu</h2>
<label>Datum: </label>
<input type="date" id="quizDate"><br>
<label>Popis: </label>
<input type="text" id="quizDesc" style="width:300px;"><br><br>

<h2>Nastavení týmů</h2>
<label>Počet týmů: </label>
<input type="number" id="teamCount" min="1">
<button onclick="createTeams()">Vytvořit týmy</button>

<div id="teams"></div>

<h2>Zadání výsledků</h2>
<div id="rounds"></div>

<h2>Výsledky</h2>
<button onclick="openBigTable()">Zvětšit tabulku</button>
<button onclick="exportImage()">Export PNG</button>

<table id="results">
<thead></thead>
<tbody></tbody>
</table>

<div id="bigTable">
<button onclick="closeBigTable()">Zavřít</button>
<div id="bigContent"></div>
</div>

<script>
let teams = [];
let rounds = 5;
let lockedRounds = Array(rounds).fill(true);

function createTeams() {
    const count = parseInt(document.getElementById('teamCount').value);
    if (!count || count < 1) return alert("Zadej počet týmů");

    const container = document.getElementById('teams');
    container.innerHTML = '';

    for (let i = 0; i < count; i++) {
        container.innerHTML += `Tým ${i+1}: 
        <input type="text" id="team_${i}">
        hráči: <input type="number" value="1" min="1" id="players_${i}"><br>`;
    }

    container.innerHTML += '<button onclick="startQuiz()">Začít kvíz</button>';
}

function startQuiz() {
    teams = [];
    const count = document.getElementById('teamCount').value;

    for (let i = 0; i < count; i++) {
        teams.push({
            name: document.getElementById(`team_${i}`).value.trim() || `Tým ${i+1}`,
            players: Math.max(1, parseInt(document.getElementById(`players_${i}`).value) || 1),
            scores: Array(rounds).fill(0),
            total: 0,
            tipTotal: 0
        });
    }

    createRounds();
}

function toggleRound(r) {
    lockedRounds[r] = !lockedRounds[r];

    teams.forEach((_, i) => {
        document.getElementById(`score_${i}_${r}`).disabled = lockedRounds[r];
        document.getElementsByName(`bonus_${i}_${r}`).forEach(el => el.disabled = lockedRounds[r]);
        document.getElementById(`tip_${i}_${r}`).disabled = lockedRounds[r];
    });

    document.getElementById(`head_${r}`).classList.toggle('locked', lockedRounds[r]);
}

function handleEnter(e) {
    if (e.key !== 'Enter') return;

    const [_, i, r] = e.target.id.split('_').map(Number);

    if (lockedRounds[r]) return;

    e.preventDefault();

    let next = document.getElementById(`score_${i}_${r+1}`);
    if (!next || lockedRounds[r+1]) next = document.getElementById(`score_${i+1}_0`);

    if (next && !next.disabled) next.focus();
}

function createRounds() {
    let html = '<table><tr><th>Tým</th><th class="col-players">Hráči</th>';

    for (let r = 0; r < rounds; r++) {
        html += `<th id="head_${r}" class="roundHeader locked" onclick="toggleRound(${r})">
            ${r+1}. kolo
        </th>`;
    }
    html += '</tr>';

    teams.forEach((team, i) => {
        html += `<tr><td>${team.name}</td><td>${team.players}</td>`;
        for (let r = 0; r < rounds; r++) {
            html += `<td>
                <input type="number" min="0" max="10"
                    disabled
                    onkeydown="handleEnter(event)"
                    oninput="calculateScores()"
                    id="score_${i}_${r}">

                <div class="bonusGroup">
                    <span>Bonus</span>
                    <label><input type="radio" name="bonus_${i}_${r}" value="0.5" onchange="calculateScores()">0.5</label>
                    <label><input type="radio" name="bonus_${i}_${r}" value="1" onchange="calculateScores()">1</label>
                    <label><input type="radio" name="bonus_${i}_${r}" value="2" onchange="calculateScores()">2</label>
                </div>

                <div class="tipLine">
                    <label style="color:blue;">
                        Tipovačka<input type="checkbox" onchange="handleTip(${i},${r})" id="tip_${i}_${r}" disabled>
                    </label>
                </div>
            </td>`;
        }
        html += '</tr>';
    });

    html += '</table>';
    document.getElementById('rounds').innerHTML = html;
}

function handleTip(teamIndex, roundIndex) {
    if (lockedRounds[roundIndex]) return;

    teams.forEach((_, i) => {
        const el = document.getElementById(`tip_${i}_${roundIndex}`);
        if (el) el.checked = (i === teamIndex);
    });
    calculateScores();
}

function getBonus(i, r) {
    let radios = document.getElementsByName(`bonus_${i}_${r}`);
    for (let el of radios) {
        if (el.checked) return parseFloat(el.value);
    }
    return 0;
}

function formatDate(d) {
    if (!d) return '-';
    let date = new Date(d);
    return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${date.getFullYear()}`;
}

function calculateScores() {
    teams.forEach((team, i) => {
        let sum = 0;
        team.tipTotal = 0;

        for (let r = 0; r < rounds; r++) {
            let base = parseInt(document.getElementById(`score_${i}_${r}`).value);
            if (isNaN(base)) base = 0;

            let bonus = getBonus(i, r);
            let tip = document.getElementById(`tip_${i}_${r}`).checked ? 1 : 0;

            team.scores[r] = base + bonus + tip;
            sum += base + bonus + tip;
            team.tipTotal += tip;
        }

        team.total = sum;
    });

    updateTable();
}

function updateTable() {
    const sorted = [...teams].sort((a, b) => b.total - a.total);

    let date = formatDate(document.getElementById('quizDate').value);
    let desc = document.getElementById('quizDesc').value || '-';

    let head = `<tr><th colspan="${rounds+5}">${desc}</th></tr>`;
    head += `<tr><th colspan="${rounds+5}">Datum: ${date}</th></tr>`;
    head += `<tr>
        <th class="col-rank">Pořadí</th>
        <th>Tým</th>
        <th class="col-players">Hráči</th>`;

    for (let r=0;r<rounds;r++) head+=`<th>${r+1}. kolo</th>`;
    head += `<th>Tipovačky</th><th>Celkem</th></tr>`;

    document.querySelector('#results thead').innerHTML = head;

    let body = '';

    sorted.forEach((team,i)=>{
        let row = `<tr>
        <td>${i+1}.</td><td>${team.name}</td><td>${team.players}</td>`;

        team.scores.forEach((s,r)=>{
            let base = parseInt(document.getElementById(`score_${teams.indexOf(team)}_${r}`).value) || 0;
            let bonus = getBonus(teams.indexOf(team), r);
            let bonusHtml = bonus ? `<span class="bonusTag">+${bonus}</span>` : '';

            row += `<td>
                <div class="scoreCell">${base}</div>
                ${bonusHtml}
            </td>`;
        });

        row += `<td>${team.tipTotal}</td>`;
        row += `<td class="total">${team.total}</td></tr>`;

        body += row;
    });

    document.querySelector('#results tbody').innerHTML = body;
}

/* FULLSCREEN */
function openBigTable() {
    document.getElementById("bigContent").innerHTML =
        document.getElementById("results").outerHTML;
    document.getElementById("bigTable").style.display = "block";
}
function closeBigTable() {
    document.getElementById("bigTable").style.display = "none";
}

/* EXPORT PNG */
function exportImage() {
    html2canvas(document.getElementById("results")).then(canvas => {
        let link = document.createElement('a');
        link.download = 'vysledky.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
