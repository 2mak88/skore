<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Kvízová tabulka PRO</title>

<style>
body { font-family: Arial; margin: 20px; }
input { margin: 5px; width: 70px; }

/* TABULKA VÝSLEDKŮ */
#results {
    border: 3px solid black;
    border-collapse: collapse;
    width: 100%;
    margin-top: 20px;
}

#results th,
#results td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
    font-weight: bold;
}

#results th {
    background-color: #eee;
}

tr:nth-child(even) { background-color: #f2f2f2; }

.total { background-color: #d0d0d0; }

button { margin: 10px 5px; padding: 8px 12px; }

/* zarovnání skóre */
.scoreCell {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
}
.scoreCell .base {
    min-width: 28px;
    text-align: right;
}
.scoreCell .extras {
    min-width: 30px;
    text-align: left;
    font-size: 12px;
}
.scoreCell .extras span {
    margin-left: 2px;
}

/* fullscreen tabulka */
#bigTable {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:white;
    overflow:auto;
    display:none;
    padding:20px;
}
#bigTable table {
    font-size: 26px;
}
</style>

</head>

<body>

<h2>Nastavení kvízu</h2>
<label>Datum: </label>
<input type="date" id="quizDate"><br>
<label>Popis: </label>
<input type="text" id="quizDesc" style="width:300px;"><br><br>

<h2>Nastavení týmů</h2>
<label>Počet týmů: </label>
<input type="number" id="teamCount" min="1" value="3">
<button onclick="createTeams()">Vytvořit týmy</button>

<div id="teams"></div>

<h2>Zadání výsledků</h2>
<div id="rounds"></div>

<h2>Výsledky</h2>
<button onclick="openBigTable()">Zvětšit tabulku</button>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportImage()">Export obrázek</button>

<table id="results">
<thead></thead>
<tbody></tbody>
</table>

<div id="bigTable">
<button onclick="closeBigTable()">Zavřít</button>
<div id="bigContent"></div>
</div>

<script>
let teams = [];
let rounds = 5;

function createTeams() {
    const count = document.getElementById('teamCount').value;
    const container = document.getElementById('teams');
    container.innerHTML = '';

    for (let i = 0; i < count; i++) {
        container.innerHTML += `Tým ${i+1}: 
        <input type="text" id="team_${i}">
        hráči: <input type="number" value="1" id="players_${i}"><br>`;
    }

    container.innerHTML += '<button onclick="startQuiz()">Začít kvíz</button>';
}

function startQuiz() {
    teams = [];
    const count = document.getElementById('teamCount').value;

    for (let i = 0; i < count; i++) {
        teams.push({
            name: document.getElementById(`team_${i}`).value.trim() || `Tým ${i+1}`,
            players: parseInt(document.getElementById(`players_${i}`).value) || 1,
            scores: Array(rounds).fill(0),
            total: 0,
            tipTotal: 0
        });
    }

    createRounds();
}

function handleEnter(e) {
    if (e.key === 'Enter') {
        e.preventDefault();

        const [_, i, r] = e.target.id.split('_').map(Number);
        const next = document.getElementById(`score_${i+1}_${r}`);

        if (next) next.focus();
        else e.target.blur();

        calculateScores();
    }
}

function handleTip(teamIndex, roundIndex) {
    teams.forEach((_, i) => {
        if (i !== teamIndex) {
            const el = document.getElementById(`tip_${i}_${roundIndex}`);
            if (el) el.checked = false;
        }
    });
    calculateScores();
}

function createRounds() {
    let html = '<table><tr><th>Tým</th><th>Hráči</th>';

    for (let r = 0; r < rounds; r++) {
        html += `<th>${r+1}. kolo</th>`;
    }
    html += '</tr>';

    teams.forEach((team, i) => {
        html += `<tr><td>${team.name}</td><td>${team.players}</td>`;
        for (let r = 0; r < rounds; r++) {
            html += `<td>
                <input type="number" step="0.1"
                    oninput="calculateScores()"
                    onkeydown="handleEnter(event)"
                    id="score_${i}_${r}" value="0">

                <div style="display:flex;flex-direction:column;align-items:flex-start;margin-top:5px;font-size:12px;">
                    <label style="color:green;">
                        Bonus <input type="checkbox" onchange="calculateScores()" id="bonus_${i}_${r}">
                    </label>
                    <label style="color:blue;">
                        Tipovačka <input type="checkbox" onchange="handleTip(${i},${r})" id="tip_${i}_${r}">
                    </label>
                </div>
            </td>`;
        }
        html += '</tr>';
    });

    html += '</table>';
    document.getElementById('rounds').innerHTML = html;
    calculateScores();
}

function calculateScores() {
    teams.forEach((team, i) => {
        let sum = 0;
        team.tipTotal = 0;

        for (let r = 0; r < rounds; r++) {
            let val = parseFloat(document.getElementById(`score_${i}_${r}`).value) || 0;
            let bonus = document.getElementById(`bonus_${i}_${r}`).checked ? 1 : 0;
            let tip = document.getElementById(`tip_${i}_${r}`).checked ? 1 : 0;

            team.scores[r] = val + bonus + tip;
            sum += val + bonus + tip;
            team.tipTotal += tip;
        }

        team.total = sum;
    });

    updateTable();
}

function updateTable() {
    const sorted = teams
        .map((t, i) => ({ ...t, originalIndex: i }))
        .sort((a, b) => {
            if (b.total !== a.total) return b.total - a.total;
            if (a.players !== b.players) return a.players - b.players;
            return a.tipTotal - b.tipTotal;
        });

    let date = document.getElementById('quizDate').value || '-';
    let desc = document.getElementById('quizDesc').value || '-';

    let head = `<tr><th colspan="${rounds+5}">${desc}</th></tr>`;
    head += `<tr><th colspan="${rounds+5}">Datum: ${date}</th></tr>`;
    head += `<tr><th>Pořadí</th><th>Tým</th><th>Hráči</th>`;

    for (let r=0;r<rounds;r++) head+=`<th>${r+1}</th>`;
    head += `<th>Tipovačky</th><th>Celkem</th></tr>`;

    document.querySelector('#results thead').innerHTML = head;

    let body = '';

    sorted.forEach((team,i)=>{
        let row = `<tr>
        <td>${i+1}</td><td>${team.name}</td><td>${team.players}</td>`;

        team.scores.forEach((s,r)=>{
            let bonus = document.getElementById(`bonus_${team.originalIndex}_${r}`)?.checked;
            let tip = document.getElementById(`tip_${team.originalIndex}_${r}`)?.checked;

            let base = s;
            let bTxt='', tTxt='';

            if (bonus){ base--; bTxt=' <span style="color:green;">+1</span>'; }
            if (tip){ base--; tTxt=' <span style="color:blue;">+1</span>'; }

            row += `<td>
                <div class="scoreCell">
                    <span class="base">${base}</span>
                    <span class="extras">${bTxt}${tTxt}</span>
                </div>
            </td>`;
        });

        row += `<td>${team.tipTotal}</td>`;
        row += `<td class="total">${team.total}</td></tr>`;

        body += row;
    });

    document.querySelector('#results tbody').innerHTML = body;
}

function openBigTable() {
    document.getElementById('bigTable').style.display='block';
    document.getElementById('bigContent').innerHTML =
        document.getElementById('results').outerHTML;
}

function closeBigTable() {
    document.getElementById('bigTable').style.display='none';
}

function exportCSV() {
    const sorted=[...teams].sort((a,b)=>b.total-a.total);
    let csv='Poradi,Tym,Hraci';
    for(let r=0;r<rounds;r++) csv+=`,Kolo ${r+1}`;
    csv+=',Tipovacky,Celkem\n';

    sorted.forEach((t,i)=>{
        csv+=`${i+1},${t.name},${t.players}`;
        t.scores.forEach(s=>csv+=`,`+s);
        csv+=`,`+t.tipTotal+`,`+t.total+`\n`;
    });

    const blob=new Blob([csv]);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='vysledky.csv';
    a.click();
}

function exportImage() {
    html2canvas(document.getElementById('results'), {
        scale: 2,
        useCORS: true
    }).then(canvas=>{
        let a=document.createElement('a');
        a.href=canvas.toDataURL();
        a.download='vysledky.png';
        a.click();
    });
}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
