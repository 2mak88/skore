<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Kvízová tabulka PRO</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

input[type="number"],
input[type="text"],
input[type="date"] {
    margin: 2px;
}

#quizDesc {
    width: 300px;
}

.mobile input[type="number"],
.mobile input[type="text"],
.mobile input[type="date"] {
    font-size: 16px;
}

/* TABULKY */
#results,
#rounds table {
    border: 3px solid black;
    border-collapse: collapse;
    width: 100%;
    margin-top: 20px;
    table-layout: fixed;
}

#rounds {
    overflow-x: auto;
}

#results th, #results td,
#rounds th, #rounds td {
    border: 1px solid black;
    padding: 4px;
    text-align: center;
    font-weight: bold;
    position: relative;
    vertical-align: middle;
}

#results th {
    background-color: #eee;
}

tr:nth-child(even) {
    background-color: #f2f2f2;
}

.total {
    background-color: #d0d0d0;
}

.col-rank { width: 75px; }
.col-players { width: 65px; }
.col-team { width: 160px; }

button {
    margin: 10px 5px;
    padding: 8px 12px;
}

/* Odemčené / zamčené kolo */
.roundHeader {
    cursor: pointer;
    user-select: none;
}
.locked {
    background: #ddd;
}
.activeRound {
    background: #fff3b0 !important;
}

/* Zadávání v buňce */
.roundCellWrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}

.scoreInput {
    width: 52px;
    text-align: center;
}

.mobile .scoreInput {
    width: 66px;
    font-size: 16px;
}

.controlRow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
    font-size: 10px;
    line-height: 1.1;
}

.mobile .controlRow {
    font-size: 12px;
}

.labelGreen {
    color: green;
}

.labelBlue {
    color: #1d4ed8;
}

.toggleBtn {
    border: 1px solid #888;
    background: white;
    color: #222;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    margin: 0;
    min-width: 0;
    line-height: 1.1;
}

.mobile .toggleBtn {
    font-size: 12px;
    padding: 3px 7px;
}

.toggleBtn.green.active {
    background: #22c55e;
    border-color: #16a34a;
    color: white;
}

.toggleBtn.blue.active {
    background: #2563eb;
    border-color: #1d4ed8;
    color: white;
}

.toggleBtn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
}

/* Výsledková tabulka */
.scoreCell {
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.mainScore {
    font-size: 16px;
    font-weight: bold;
}

.badges {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
}

.badge {
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 14px;
    font-weight: bold;
    line-height: 1.1;
    color: white;
    white-space: nowrap;
}

.badgeGreen {
    background: #16a34a;
}

.badgeBlue {
    background: #2563eb;
}

/* fullscreen */
#bigTable {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    overflow: auto;
    display: none;
    padding: 20px;
    box-sizing: border-box;
    z-index: 9999;
}

#bigTable table {
    font-size: 26px;
}

.mobile #bigTable table {
    font-size: 22px;
}
</style>
</head>

<body>

<h2>Nastavení kvízu</h2>
<label>Datum: </label>
<input type="date" id="quizDate"><br>
<label>Popis: </label>
<input type="text" id="quizDesc"><br><br>

<h2>Nastavení týmů</h2>
<label>Počet týmů: </label>
<input type="number" id="teamCount" min="1">
<button onclick="createTeams()">Vytvořit týmy</button>

<br>
<label>
    📱 Mobilní režim
    <input type="checkbox" onchange="toggleMobile(this)">
</label>

<div id="teams"></div>

<h2>Zadání výsledků</h2>
<div id="rounds"></div>

<h2>Výsledky</h2>
<button onclick="openBigTable()">Zvětšit tabulku</button>
<button onclick="exportImage()">Export PNG</button>

<table id="results">
    <thead></thead>
    <tbody></tbody>
</table>

<div id="bigTable">
    <button onclick="closeBigTable()">Zavřít</button>
    <div id="bigContent"></div>
</div>

<script>
let teams = [];
let rounds = 5;
let activeRound = null;

function toggleMobile(el) {
    document.body.classList.toggle('mobile', el.checked);
}

function createTeams() {
    const count = parseInt(document.getElementById('teamCount').value, 10);
    if (!count || count < 1) {
        alert('Zadej počet týmů');
        return;
    }

    const container = document.getElementById('teams');
    let html = '';

    for (let i = 0; i < count; i++) {
        html += `Tým ${i + 1}:
        <input type="text" id="team_${i}">
        hráči: <input type="number" value="1" min="1" id="players_${i}"><br>`;
    }

    html += '<button onclick="startQuiz()">Začít kvíz</button>';
    container.innerHTML = html;
}

function startQuiz() {
    teams = [];
    const count = parseInt(document.getElementById('teamCount').value, 10);

    for (let i = 0; i < count; i++) {
        teams.push({
            name: document.getElementById(`team_${i}`).value.trim() || `Tým ${i + 1}`,
            players: Math.max(1, parseInt(document.getElementById(`players_${i}`).value, 10) || 1),
            scores: Array(rounds).fill(0),
            total: 0,
            tipTotal: 0
        });
    }

    createRounds();
    updateTable();
}

function createRounds() {
    let html = '<table><tr><th class="col-team">Tým</th><th class="col-players">Hráči</th>';

    for (let r = 0; r < rounds; r++) {
        html += `<th id="head_${r}" class="roundHeader locked" onclick="toggleRound(${r})">${r + 1}. kolo</th>`;
    }
    html += '</tr>';

    teams.forEach((team, i) => {
        html += `<tr><td>${team.name}</td><td>${team.players}</td>`;

        for (let r = 0; r < rounds; r++) {
            html += `
                <td>
                    <div class="roundCellWrap">
                        <input
                            type="number"
                            min="0"
                            max="10"
                            class="scoreInput"
                            disabled
                            id="score_${i}_${r}"
                            onkeydown="handleEnter(event)"
                            oninput="validateScore(this); calculateScores()"
                        >

                        <div class="controlRow">
                            <span class="labelGreen">Bonus</span>
                            <button type="button" class="toggleBtn green" id="bonus05_${i}_${r}" onclick="toggleBonus(${i}, ${r}, '05')" disabled>+0,5</button>
                            <button type="button" class="toggleBtn green" id="bonus1_${i}_${r}" onclick="toggleBonus(${i}, ${r}, '1')" disabled>+1</button>
                            <button type="button" class="toggleBtn green" id="bonus2_${i}_${r}" onclick="toggleBonus(${i}, ${r}, '2')" disabled>+2</button>
                        </div>

                        <div class="controlRow">
                            <span class="labelBlue">Tipovačka</span>
                            <button type="button" class="toggleBtn blue" id="tip_${i}_${r}" onclick="handleTip(${i}, ${r})" disabled>TIP</button>
                        </div>
                    </div>
                </td>
            `;
        }

        html += '</tr>';
    });

    html += '</table>';
    document.getElementById('rounds').innerHTML = html;
}

function toggleRound(r) {
    activeRound = r;

    for (let x = 0; x < rounds; x++) {
        const locked = x !== r;

        teams.forEach((_, i) => {
            document.getElementById(`score_${i}_${x}`).disabled = locked;
            document.getElementById(`bonus05_${i}_${x}`).disabled = locked;
            document.getElementById(`bonus1_${i}_${x}`).disabled = locked;
            document.getElementById(`bonus2_${i}_${x}`).disabled = locked;
            document.getElementById(`tip_${i}_${x}`).disabled = locked;
        });

        const head = document.getElementById(`head_${x}`);
        head.classList.toggle('locked', locked);
        head.classList.toggle('activeRound', !locked);
    }
}

function handleEnter(e) {
    if (e.key !== 'Enter') return;

    const parts = e.target.id.split('_');
    const i = parseInt(parts[1], 10);
    const r = parseInt(parts[2], 10);

    if (r !== activeRound) return;

    e.preventDefault();

    const next = document.getElementById(`score_${i + 1}_${r}`);
    if (next) next.focus();
}

function validateScore(el) {
    let value = parseFloat(el.value);
    if (isNaN(value)) return;
    if (value < 0) el.value = 0;
    if (value > 10) el.value = 10;
}

function toggleBonus(teamIndex, roundIndex, type) {
    if (roundIndex !== activeRound) return;

    const btn = document.getElementById(`bonus${type}_${teamIndex}_${roundIndex}`);
    btn.classList.toggle('active');
    calculateScores();
}

function handleTip(teamIndex, roundIndex) {
    if (roundIndex !== activeRound) return;

    teams.forEach((_, i) => {
        const btn = document.getElementById(`tip_${i}_${roundIndex}`);
        btn.classList.remove('active');
    });

    const clicked = document.getElementById(`tip_${teamIndex}_${roundIndex}`);
    clicked.classList.add('active');

    calculateScores();
}

function hasTip(i, r) {
    return document.getElementById(`tip_${i}_${r}`)?.classList.contains('active') || false;
}

function getBonus(i, r) {
    let sum = 0;
    if (document.getElementById(`bonus05_${i}_${r}`)?.classList.contains('active')) sum += 0.5;
    if (document.getElementById(`bonus1_${i}_${r}`)?.classList.contains('active')) sum += 1;
    if (document.getElementById(`bonus2_${i}_${r}`)?.classList.contains('active')) sum += 2;
    return sum;
}

function formatNumberCs(value) {
    if (Number.isInteger(value)) return String(value);
    return String(value).replace('.', ',');
}

function formatDate(d) {
    if (!d) return '-';
    const date = new Date(d);
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    return `${day}.${month}.${year}`;
}

function calculateScores() {
    teams.forEach((team, i) => {
        let sum = 0;
        let tips = 0;

        for (let r = 0; r < rounds; r++) {
            let base = parseFloat(document.getElementById(`score_${i}_${r}`).value);
            if (isNaN(base)) base = 0;

            const bonus = getBonus(i, r);
            const tip = hasTip(i, r) ? 1 : 0;

            team.scores[r] = base + bonus + tip;
            sum += team.scores[r];
            tips += tip;
        }

        team.total = sum;
        team.tipTotal = tips;
    });

    updateTable();
}

function updateTable() {
    const enriched = teams.map((team, i) => {
        let baseTotal = 0;
        let maxRound = 0;

        for (let r = 0; r < rounds; r++) {
            let base = parseFloat(document.getElementById(`score_${i}_${r}`)?.value);
            if (isNaN(base)) base = 0;

            baseTotal += base;
            if (base > maxRound) maxRound = base;
        }

        return {
            ...team,
            baseTotal,
            maxRound,
            originalIndex: i
        };
    });

    enriched.sort((a, b) => {
        if (b.total !== a.total) return b.total - a.total;
        if (b.baseTotal !== a.baseTotal) return b.baseTotal - a.baseTotal;
        if (a.players !== b.players) return a.players - b.players;
        if (b.maxRound !== a.maxRound) return b.maxRound - a.maxRound;
        return 0;
    });

    const date = formatDate(document.getElementById('quizDate').value);
    const desc = document.getElementById('quizDesc').value || '-';

    let head = `<tr><th colspan="${rounds + 5}">${desc}</th></tr>`;
    head += `<tr><th colspan="${rounds + 5}">Datum: ${date}</th></tr>`;
    head += `<tr>
        <th class="col-rank">Pořadí</th>
        <th class="col-team">Tým</th>
        <th class="col-players">Hráči</th>`;

    for (let r = 0; r < rounds; r++) {
        head += `<th>${r + 1}. kolo</th>`;
    }
    head += `<th>Tipovačky</th><th>Celkem</th></tr>`;

    document.querySelector('#results thead').innerHTML = head;

    let body = '';
    let lastKey = null;
    let lastRank = 0;

    enriched.forEach((team, i) => {
        const key = `${team.total}|${team.baseTotal}|${team.players}|${team.maxRound}`;
        let rank;

        if (i === 0) {
            rank = 1;
        } else if (i === 1 && key === lastKey) {
            rank = 2; // vítěz je vždy jen jeden
        } else if (key === lastKey && lastRank > 1) {
            rank = lastRank;
        } else {
            rank = i + 1;
        }

        lastKey = key;
        lastRank = rank;

        const realIndex = team.originalIndex;

        let row = `<tr>
            <td>${rank}.</td>
            <td>${team.name}</td>
            <td>${team.players}</td>`;

        for (let r = 0; r < rounds; r++) {
            let base = parseFloat(document.getElementById(`score_${realIndex}_${r}`).value);
            if (isNaN(base)) base = 0;

            const bonus = getBonus(realIndex, r);
            const tip = hasTip(realIndex, r) ? 1 : 0;
            const mainScore = base + tip;

            let badges = '';
            if (bonus > 0) badges += `<span class="badge badgeGreen">+${formatNumberCs(bonus)}</span>`;
            if (tip > 0) badges += `<span class="badge badgeBlue">TIP</span>`;

            row += `
                <td>
                    <div class="scoreCell">
                        <span class="mainScore">${formatNumberCs(mainScore)}</span>
                    </div>
                    <div class="badges">${badges}</div>
                </td>
            `;
        }

        row += `<td>${team.tipTotal}</td>`;
        row += `<td class="total">${formatNumberCs(team.total)}</td></tr>`;

        body += row;
    });

    document.querySelector('#results tbody').innerHTML = body;
}

function openBigTable() {
    document.getElementById('bigContent').innerHTML = document.getElementById('results').outerHTML;
    document.getElementById('bigTable').style.display = 'block';
}

function closeBigTable() {
    document.getElementById('bigTable').style.display = 'none';
}

function exportImage() {
    html2canvas(document.getElementById('results'), {
        scale: window.devicePixelRatio * 2
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'vysledky.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
